repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff lint
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi, jupyter]

      - id: ruff-format
        name: Ruff format
        entry: uv run ruff format --check
        language: system
        types_or: [python, pyi, jupyter]

      - id: pytest
        name: pytest
        entry: uv run pytest -q
        language: system
        pass_filenames: false
